apiVersion: v1
kind: Secret
metadata:
  name: rclone-gdrive-secret
  namespace: default
type: Opaque
stringData:
  rclone.conf: |
    [gdrive]
    type = drive
    scope = drive
    # ---------------------------------------------------------------------------
    # HOW TO GENERATE THIS CONFIG:
    #
    # On your local machine (with rclone installed):
    #
    #   1. rclone authorize "drive"
    #      (opens browser → authenticate with Google → copy the JSON token)
    #
    #   2. Or run:
    #      rclone config create gdrive drive scope=drive
    #      (follow the interactive flow, select "headless machine" when prompted)
    #
    #   3. Then view your config:
    #      rclone config file   # prints the path to rclone.conf
    #      rclone config show   # prints the config content
    #
    #   4. Copy the full [gdrive] section (including token) into the
    #      stringData.rclone.conf field below, then apply:
    #
    #      kubectl apply -f 01-rclone-config-secret.yaml
    #
    #   5. Verify with:
    #      kubectl -n default exec deploy/ftps-gdrive -- cat /config/rclone/rclone.conf
    # ---------------------------------------------------------------------------
    # token = {"access_token":"...","token_type":"Bearer","refresh_token":"...","expiry":"..."}

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ftps-gdrive
  namespace: default
  labels:
    app: ftps-gdrive
spec:
  selector:
    matchLabels:
      app: ftps-gdrive
  template:
    metadata:
      labels:
        app: ftps-gdrive
    spec:
      serviceAccountName: ftps-gdrive

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - lighthouse-den-1
                      - lighthouse-yul-1

      initContainers:
        - name: setup-mountpoint
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/gdrive
              chmod 777 /data/gdrive
          volumeMounts:
            - name: shared-data
              mountPath: /data

      containers:
        - name: rclone-backend
          image: rclone/rclone:1.68
          command:
            - rclone
            - mount
            - "gdrive:/"
            - /data/gdrive
            - --allow-non-empty
            - --vfs-cache-mode=full
            - --daemon-timeout=0
            - --log-level=INFO
            - --log-file=/tmp/rclone.log
          env:
            - name: RCLONE_CONFIG
              value: /config/rclone/rclone.conf
            # Tells Google auth library how to swap our K8s SA token
            # for a GCP access token via Workload Identity Federation
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /config/gcp/sts-creds.json
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: shared-data
              mountPath: /data
            - name: rclone-config
              mountPath: /config/rclone
            - name: gcp-auth
              mountPath: /config/gcp
              readOnly: true
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"

        - name: ftps-frontend
          image: panubo/vsftpd:1.3.1
          env:
            - name: VSFTPD_USERNAME
              value: ftpuser
            - name: VSFTPD_PASSWORD
              value: "changeme-in-cluster-config"
            - name: VSFTPD_LOCAL_ROOT
              value: /data/gdrive
            - name: VSFTPD_CHROOT_LOCAL_USER
              value: "YES"
            - name: VSFTPD_ANON_ENABLE
              value: "NO"
            - name: VSFTPD_WRITE_ENABLE
              value: "YES"
            - name: VSFTPD_PASV_MIN_PORT
              value: "21100"
            - name: VSFTPD_PASV_MAX_PORT
              value: "21102"
            - name: VSFTPD_PASV_PROMISCUOUS
              value: "YES"
            - name: VSFTPD_SSL_ENABLE
              value: "YES"
            - name: VSFTPD_PASV_ADDRESS
              value: "CHANGE-ME-YOUR-DOMAIN.com"
          ports:
            - containerPort: 21
              name: ftp-control
              hostPort: 21
            - containerPort: 21100
              name: ftp-data-0
              hostPort: 21100
              protocol: TCP
            - containerPort: 21101
              name: ftp-data-1
              hostPort: 21101
              protocol: TCP
            - containerPort: 21102
              name: ftp-data-2
              hostPort: 21102
              protocol: TCP
          volumeMounts:
            - name: shared-data
              mountPath: /data
            - name: ftps-ssl-certs
              mountPath: /etc/vsftpd/ssl
              readOnly: true
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "100m"

      volumes:
        - name: shared-data
          emptyDir:
            medium: Memory
        - name: rclone-config
          configMap:
            name: rclone-config
        - name: gcp-auth
          configMap:
            name: gcp-auth-config
        - name: ftps-ssl-certs
          secret:
            secretName: ftps-ssl-certs

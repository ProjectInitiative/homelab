apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftps-gdrive
  namespace: default
  labels:
    app: ftps-gdrive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftps-gdrive
  template:
    metadata:
      labels:
        app: ftps-gdrive
    spec:
      containers:
        - name: rclone-ftps
          image: rclone/rclone:1.68
          command:
            - rclone
            - serve
            - ftp
            - "gdrive:/"
            - --addr=:21
            - --user=ftpuser
            - --pass=changeme-in-cluster-config
            - --cert=/etc/ssl/vsftpd.pem
            - --key=/etc/ssl/vsftpd.key
            - --passive-port-range=21100-21102
            - --vfs-cache-mode=full
          env:
            - name: RCLONE_CONFIG
              value: /config/rclone.conf
          ports:
            - containerPort: 21
              name: ftp-control
            - containerPort: 21100
              name: ftp-data-0
              protocol: TCP
            - containerPort: 21101
              name: ftp-data-1
              protocol: TCP
            - containerPort: 21102
              name: ftp-data-2
              protocol: TCP
          volumeMounts:
            - name: rclone-config
              mountPath: /config
            - name: ftps-ssl-certs
              mountPath: /etc/ssl
              readOnly: true
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"

      volumes:
        - name: rclone-config
          secret:
            secretName: rclone-gdrive-secret
        - name: ftps-ssl-certs
          secret:
            secretName: ftps-ssl-certs

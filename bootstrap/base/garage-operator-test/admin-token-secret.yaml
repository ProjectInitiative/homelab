# Admin token secret for the operator's GarageCluster CR.
# Generate with: openssl rand -hex 32
# The operator will use this to authenticate to Garage's Admin API (port 3903).
apiVersion: v1
kind: Secret
metadata:
  name: garage-admin-token
  namespace: garage
type: Opaque
stringData:
  admin-token: "replace-with-actual-admin-token"

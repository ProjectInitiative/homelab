---
# This ClusterRole is ready for granting debug/exec access on-demand.
# It is NOT bound by default — to activate it for a namespace:
#   kubectl create rolebinding mcp-debug-<ns> \
#     --clusterrole=mcp-namespace-debugger \
#     --serviceaccount=mcp-system:mcp-agent-sa \
#     -n <namespace>
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-namespace-debugger
rules:
  - apiGroups: [""]
    resources:
      - pods/exec
      - pods/attach
      - pods/portforward
    verbs: ["create"]
  - apiGroups: [""]
    resources:
      - pods/ephemeralcontainers
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["create", "get", "list", "watch"]

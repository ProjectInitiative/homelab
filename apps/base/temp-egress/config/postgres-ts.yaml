apiVersion: v1
kind: Service
metadata:
  name: postgres-rw-tailscale
  namespace: postgres-db
  annotations:
    tailscale.com/hostname: "postgres-rw"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    cnpg.io/cluster: postgres-cluster
    role: primary
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-ro-tailscale
  namespace: postgres-db
  annotations:
    tailscale.com/hostname: "postgres-ro"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    cnpg.io/cluster: postgres-cluster
    role: replica
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      name: postgres
